<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>长春市 WGS84 地图</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        
        #map {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        .loading-text {
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }
        
        .error-message {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div id="map">
        <div id="loading" class="loading-overlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在加载地图...</div>
        </div>
    </div>
    
    <!-- Leaflet JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
    
    <script>
        /**
         * IIFE (Immediately Invoked Function Expression)
         * 将所有代码封装在自执行函数中，避免全局变量污染
         */
        (function() {
            'use strict';
            
            /**
             * 坐标校验函数
             * 对经纬度范围进行合法性判断
             * @param {number} lat - 纬度值
             * @param {number} lng - 经度值
             * @returns {number[]} 返回校验通过的坐标数组 [lat, lng]
             * @throws {TypeError} 当输入不是数字时抛出
             * @throws {RangeError} 当经纬度超出有效范围时抛出
             */
            const validateLatLng = function(lat, lng) {
                if (typeof lat !== 'number' || typeof lng !== 'number') {
                    throw new TypeError('经纬度必须为数字类型');
                }
                
                if (lat < -90 || lat > 90) {
                    throw new RangeError(`纬度 ${lat} 超出有效范围 [-90, 90]`);
                }
                
                if (lng < -180 || lng > 180) {
                    throw new RangeError(`经度 ${lng} 超出有效范围 [-180, 180]`);
                }
                
                return [lat, lng];
            };
            
            /**
             * 节流函数
             * 限制函数在指定时间内最多执行一次
             * @param {Function} func - 需要节流的函数
             * @param {number} limit - 节流时间（毫秒）
             * @returns {Function} 返回节流后的函数
             */
            const throttle = function(func, limit) {
                let inThrottle = false;
                return function(...args) {
                    if (!inThrottle) {
                        func.apply(this, args);
                        inThrottle = true;
                        setTimeout(() => {
                            inThrottle = false;
                        }, limit);
                    }
                };
            };
            
            /**
             * 瓦片加载错误处理回调
             * @param {Object} error - 错误对象
             */
            const handleTileError = function(error) {
                console.error('瓦片加载失败:', error);
            };
            
            /**
             * 地图初始化函数
             */
            const initMap = function() {
                // 地图配置常量
                const mapContainerId = 'map';
                const loadingOverlayId = 'loading';
                const changchunCenter = validateLatLng(43.886957, 125.325354);
                const initialZoom = 10;
                
                // 创建地图实例
                const map = L.map(mapContainerId, {
                    center: changchunCenter,
                    zoom: initialZoom,
                    zoomControl: true,
                    preferCanvas: false,
                    attributionControl: true
                });
                
                // 添加比例尺控件
                L.control.scale({
                    position: 'bottomleft',
                    metric: true,
                    imperial: false
                }).addTo(map);
                
                // 创建多个瓦片图层作为备用（选择在国内网络环境下稳定的服务）
                const tileLayers = {
                    'Carto 浅色': L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', {
                        minZoom: 0,
                        maxZoom: 19,
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                        subdomains: 'abcd'
                    }),
                    'Carto 深色': L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
                        minZoom: 0,
                        maxZoom: 19,
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                        subdomains: 'abcd'
                    }),
                    'Carto 简约': L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png', {
                        minZoom: 0,
                        maxZoom: 19,
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                        subdomains: 'abcd'
                    }),
                    'OpenTopoMap': L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
                        minZoom: 1,
                        maxZoom: 17,
                        attribution: 'Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, <a href="http://viewfinderpanoramas.org">SRTM</a> | Map style: &copy; <a href="https://opentopomap.org">OpenTopoMap</a> (<a href="https://creativecommons.org/licenses/by-sa/3.0/">CC-BY-SA</a>)',
                        subdomains: 'abc'
                    }),
                    'Esri 卫星': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                        minZoom: 1,
                        maxZoom: 19,
                        attribution: 'Source: Esri, Maxar, GeoEye, Earthstar Geographics, CNES/Airbus DS, USDA, USGS, AeroGRID, IGN, and the GIS User Community'
                    }),
                    'Esri 街道': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
                        minZoom: 1,
                        maxZoom: 19,
                        attribution: 'Source: Esri, HERE, Garmin, © OpenStreetMap contributors, and the GIS User Community'
                    }),
                    'Thunderforest 地形': L.tileLayer('https://{s}.tile.thunderforest.com/outdoors/{z}/{x}/{y}.png?apikey=4ac3890bc3624a86b4698d65d4ee3822', {
                        minZoom: 1,
                        maxZoom: 18,
                        attribution: '&copy; <a href="https://www.thunderforest.com">Thunderforest</a>, &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                        subdomains: 'abc'
                    }),
                    'Thunderforest 交通': L.tileLayer('https://{s}.tile.thunderforest.com/transport/{z}/{x}/{y}.png?apikey=4ac3890bc3624a86b4698d65d4ee3822', {
                        minZoom: 1,
                        maxZoom: 18,
                        attribution: '&copy; <a href="https://www.thunderforest.com">Thunderforest</a>, &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                        subdomains: 'abc'
                    })
                };
                
                // 绑定瓦片加载错误回调
                Object.values(tileLayers).forEach(layer => {
                    layer.on('tileerror', handleTileError);
                });
                
                // 默认使用 Carto 浅色底图（更稳定）
                tileLayers['Carto 浅色'].addTo(map);
                
                // 创建图层组，用于统一管理覆盖层
                const overlayLayerGroup = L.layerGroup().addTo(map);
                
                // 添加图层切换器控件
                L.control.layers(tileLayers, {
                    '覆盖层': overlayLayerGroup
                }, {
                    collapsed: false,
                    position: 'topright'
                }).addTo(map);
                
                // 创建长春市标记点
                const changchunMarker = L.marker(changchunCenter, {
                    title: '长春市'
                }).addTo(overlayLayerGroup);
                
                // 绑定标记点弹窗
                changchunMarker.bindPopup(`
                    <div style="padding: 10px; min-width: 150px;">
                        <h4 style="margin: 0 0 8px 0; color: #333;">长春市</h4>
                        <p style="margin: 0; font-size: 13px; color: #666;">吉林省省会</p>
                        <p style="margin: 5px 0 0 0; font-size: 12px; color: #999;">
                            坐标: ${changchunCenter[0].toFixed(6)}, ${changchunCenter[1].toFixed(6)}
                        </p>
                    </div>
                `);
                
                // 创建市中心范围圆形（半径 5 公里）
                const cityCenterCircle = L.circle(changchunCenter, {
                    radius: 5000,
                    color: '#e74c3c',
                    weight: 2,
                    fillColor: '#e74c3c',
                    fillOpacity: 0.2,
                    className: 'city-center-circle'
                }).addTo(overlayLayerGroup);
                
                // 创建示例多边形（三角形区域）
                const samplePolygon = L.polygon([
                    changchunCenter,
                    [changchunCenter[0] + 0.02, changchunCenter[1] + 0.02],
                    [changchunCenter[0] - 0.02, changchunCenter[1] + 0.02]
                ], {
                    color: '#3498db',
                    weight: 2,
                    fillColor: '#3498db',
                    fillOpacity: 0.2,
                    className: 'sample-polygon'
                }).addTo(overlayLayerGroup);
                
                // 创建复用的点击弹窗实例
                const clickPopup = L.popup({
                    maxWidth: 250,
                    minWidth: 150,
                    closeButton: true,
                    autoPan: true
                });
                
                /**
                 * 地图点击事件处理函数
                 * @param {Object} event - 点击事件对象
                 */
                const handleMapClick = function(event) {
                    const lat = event.latlng.lat.toFixed(6);
                    const lng = event.latlng.lng.toFixed(6);
                    
                    clickPopup
                        .setLatLng(event.latlng)
                        .setContent(`
                            <div style="padding: 8px;">
                                <p style="margin: 0; font-size: 14px; color: #333;">
                                    <strong>坐标信息</strong>
                                </p>
                                <p style="margin: 5px 0 0 0; font-size: 13px; color: #666;">
                                    纬度: <code>${lat}</code>
                                </p>
                                <p style="margin: 3px 0 0 0; font-size: 13px; color: #666;">
                                    经度: <code>${lng}</code>
                                </p>
                            </div>
                        `)
                        .openOn(map);
                };
                
                // 绑定节流后的点击事件（200ms 节流）
                map.on('click', throttle(handleMapClick, 200));
                
                /**
                 * 地图加载完成事件处理
                 * 隐藏加载遮罩
                 */
                const handleMapLoad = function() {
                    const loadingOverlay = document.getElementById(loadingOverlayId);
                    if (loadingOverlay) {
                        loadingOverlay.classList.add('hidden');
                    }
                    console.log('地图加载完成');
                };
                
                // 绑定地图加载完成事件
                map.on('load', handleMapLoad);
                
                // 手动触发加载完成事件（针对已缓存的瓦片）
                setTimeout(() => {
                    const loadingOverlay = document.getElementById(loadingOverlayId);
                    if (loadingOverlay && !loadingOverlay.classList.contains('hidden')) {
                        loadingOverlay.classList.add('hidden');
                    }
                }, 3000);
                
                return map;
            };
            
            /**
             * 主入口函数
             * 使用 try-catch 捕获所有初始化异常
             */
            const main = function() {
                try {
                    // 初始化地图
                    const mapInstance = initMap();
                    
                    // 将地图实例暴露到全局（如需外部访问）
                    window.changchunMap = mapInstance;
                    
                    console.log('长春市地图初始化成功');
                    
                } catch (error) {
                    console.error('地图初始化失败:', error);
                    
                    // 显示错误信息
                    const loadingOverlay = document.getElementById('loading');
                    if (loadingOverlay) {
                        loadingOverlay.innerHTML = `
                            <div style="text-align: center;">
                                <div style="font-size: 48px; margin-bottom: 15px;">🗺️</div>
                                <div class="loading-text">地图加载失败</div>
                                <div class="error-message">${error.message}</div>
                            </div>
                        `;
                    }
                }
            };
            
            // DOM 加载完成后执行主入口
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', main);
            } else {
                main();
            }
        })();
    </script>
</body>
</html>
